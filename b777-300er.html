<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AviaCalc Pro | B777-300ER</title>
    <style>
        :root {
            --primary: #fbbf24; /* Amarelo Boeing */
            --accent: #2563eb;
            --bg: #0f172a;
            --card: #1e293b;
        }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: var(--bg); 
            color: #f8fafc;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            min-height: 100vh;
        }

        .app-container {
            width: 100%;
            max-width: 450px;
            background: var(--card);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        header { text-align: center; margin-bottom: 20px; border-bottom: 2px solid var(--primary); padding-bottom: 10px; }
        header h1 { margin: 0; font-size: 22px; color: var(--primary); }
        .specs { font-size: 10px; color: #94a3b8; margin-top: 5px; text-transform: uppercase; }

        .unit-switch {
            display: flex;
            background: #0f172a;
            padding: 5px;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .unit-switch button {
            flex: 1; padding: 12px; border: none; background: none;
            color: #94a3b8; font-weight: bold; cursor: pointer; border-radius: 8px;
        }

        .active-unit { background: var(--primary) !important; color: #000 !important; }

        .field { margin-bottom: 15px; }
        label { display: block; font-size: 11px; color: var(--primary); margin-bottom: 5px; font-weight: bold; }
        input { 
            width: 100%; padding: 12px; background: #0f172a; border: 1px solid #334155; 
            color: white; border-radius: 8px; box-sizing: border-box; font-size: 16px;
        }

        .calc-btn {
            width: 100%; padding: 16px; background: var(--primary); border: none;
            border-radius: 10px; color: #000; font-weight: 900; font-size: 16px;
            cursor: pointer; margin-top: 10px;
        }

        #results {
            margin-top: 20px; padding: 15px; background: rgba(0,0,0,0.4);
            border-radius: 12px; display: none; border: 1px solid #334155;
        }

        .res-line { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 14px; }
        .status { text-align: center; padding: 12px; border-radius: 8px; font-weight: 900; margin-top: 15px; }

        footer { margin-top: 25px; font-size: 12px; color: #64748b; letter-spacing: 2px; font-weight: bold; }
        .signature { color: var(--primary); }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <h1>W&B BOEING 777-300ER</h1>
        <div class="specs">MTOW: 351,535 kg (755,000 lb) | Fuel: Jet A-1 (0.803 kg/L)</div>
    </header>

    <div class="unit-switch">
        <button id="btn-met" class="active-unit" onclick="setMode('metric')">MÉTRICO (kg/L)</button>
        <button id="btn-imp" onclick="setMode('imperial')">IMPERIAL (lb/gal)</button>
    </div>

    <div class="field">
        <label>Peso Vazio Operacional (OEW) [<span class="u-w">kg</span>]</label>
        <input type="number" id="inp-empty" value="167800">
    </div>

    <div class="field">
        <label>Payload (Passageiros + Carga) [<span class="u-w">kg</span>]</label>
        <input type="number" id="inp-payload" value="0">
    </div>

    <div class="field">
        <label>Combustível no Tanque [<span id="u-f">L</span>]</label>
        <input type="number" id="inp-fuel" value="0">
    </div>

    <button class="calc-btn" onclick="calculate()">CALCULAR PERFORMANCE</button>

    <div id="results">
        <div class="res-line"><span>Peso Total:</span> <span id="out-w"></span></div>
        <div class="res-line"><span>C.G. (% MAC):</span> <span id="out-cg" style="color:var(--primary)"></span></div>
        <div id="status-box" class="status"></div>
    </div>
</div>

<footer>
    BY <span class="signature">Jordi Lima</span>
</footer>

<script>
    let currentSystem = 'metric';
    const KG_TO_LB = 2.20462;
    const L_TO_GAL = 0.264172;
    const JET_A1_DENSITY = 0.803; // kg/L

    function setMode(newSystem) {
        if (newSystem === currentSystem) return;
        const weightFields = ['inp-empty', 'inp-payload'];
        const fuelField = 'inp-fuel';

        if (newSystem === 'imperial') {
            weightFields.forEach(id => {
                let val = document.getElementById(id).value;
                if(val) document.getElementById(id).value = (val * KG_TO_LB).toFixed(0);
            });
            let fVal = document.getElementById(fuelField).value;
            if(fVal) document.getElementById(fuelField).value = (fVal * L_TO_GAL).toFixed(0);

            document.getElementById('btn-imp').classList.add('active-unit');
            document.getElementById('btn-met').classList.remove('active-unit');
            document.querySelectorAll('.u-w').forEach(el => el.innerText = 'lb');
            document.getElementById('u-f').innerText = 'gal';
        } else {
            weightFields.forEach(id => {
                let val = document.getElementById(id).value;
                if(val) document.getElementById(id).value = (val / KG_TO_LB).toFixed(0);
            });
            let fVal = document.getElementById(fuelField).value;
            if(fVal) document.getElementById(fuelField).value = (fVal / L_TO_GAL).toFixed(0);

            document.getElementById('btn-met').classList.add('active-unit');
            document.getElementById('btn-imp').classList.remove('active-unit');
            document.querySelectorAll('.u-w').forEach(el => el.innerText = 'kg');
            document.getElementById('u-f').innerText = 'L';
        }
        currentSystem = newSystem;
    }

    function calculate() {
        // Simulação de braços de momento para o 777-300ER (em metros do Datum)
        const ARM_OEW = 26.5, ARM_PAYLOAD = 27.2, ARM_FUEL = 25.8;
        const MAX_TOW_KG = 351535;
        
        let wE = parseFloat(document.getElementById('inp-empty').value) || 0;
        let wP = parseFloat(document.getElementById('inp-payload').value) || 0;
        let fQ = parseFloat(document.getElementById('inp-fuel').value) || 0;

        let we_k, wp_k, wf_k;

        if (currentSystem === 'imperial') {
            we_k = wE / KG_TO_LB;
            wp_k = wP / KG_TO_LB;
            // Gal -> L -> Kg (Jet A-1)
            wf_k = (fQ / L_TO_GAL) * JET_A1_DENSITY;
        } else {
            we_k = wE;
            wp_k = wP;
            wf_k = fQ * JET_A1_DENSITY;
        }

        let totalWeightKg = we_k + wp_k + wf_k;
        let totalMoment = (we_k * ARM_OEW) + (wp_k * ARM_PAYLOAD) + (wf_k * ARM_FUEL);
        let cgPos = totalMoment / totalWeightKg;

        // Converter posição do CG para % MAC (Simplificado para fins de estudo)
        // No 777, o MAC varia entre 24m e 31m aproximadamente
        let cgMAC = ((cgPos - 25.5) / 7) * 100;

        document.getElementById('results').style.display = 'block';
        let weightOut = (currentSystem === 'metric') ? totalWeightKg : (totalWeightKg * KG_TO_LB);
        document.getElementById('out-w').innerText = weightOut.toLocaleString(undefined, {maximumFractionDigits: 0}) + (currentSystem === 'metric' ? ' kg' : ' lb');
        document.getElementById('out-cg').innerText = cgMAC.toFixed(1) + "% MAC";

        const sBox = document.getElementById('status-box');
        const weightOk = totalWeightKg <= MAX_TOW_KG;
        const cgOk = cgMAC >= 15 && cgMAC <= 42; // Limites típicos de MAC para decolagem

        if (weightOk && cgOk) {
            sBox.innerText = "✓ DECOLAGEM AUTORIZADA";
            sBox.style.background = "#064e3b";
            sBox.style.color = "#34d399";
        } else {
            sBox.innerText = "⚠ FORA DO LIMITE";
            sBox.style.background = "#7f1d1d";
            sBox.style.color = "#f87171";
        }
    }
</script>
</body>
</html>
